<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>TechShop - Магазин гаджетів</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f8fafc;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    header {
        background: #1e293b;
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .product-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 15px;
        padding: 20px;
        display: inline-block;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    button {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>
<body>
    <header>
        <h1>TechShop</h1>
        <nav>
            <a href="#">Головна</a> | <a href="#">Товари</a> | <a href="#">Кошик</a>
        </nav>
    </header>

    <main>
        <section class="news">
            <h2>Новинки 2025</h2>
            <a href="#" class="btn-link">Дивитися</a>
        </section>

        <section class="products">
            <h2>Популярні товари</h2>
            <article class="product-card">
                <img src="https://via.placeholder.com/150" alt="Гаджет">
                <h3>Супер Гаджет</h3>
                <p class="price">Ціна: 1000 грн</p>
                <button type="button" class="buy-btn">Купити</button>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechShop</p>
        <form class="subscribe-form">
            <input type="email" placeholder="Email" required>
            <button type="submit">OK</button>
        </form>
    </footer>
</body>
</html>
